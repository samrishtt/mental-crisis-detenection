# --- Community Dashboard ---
dashboard:
  title: "MindGuard Dashboard"
  subtitle: "Anonymous Emotional Wellness Intelligence"
  
  risk_tiers:
    critical:
      label: "Immediate Attention"
      color: "#D32F2F"
      description: "Responses indicating severe distress or crisis"
      action: "Professional must review immediately"
    
    elevated:
      label: "Follow Up Needed"
      color: "#FF9800"
      description: "Responses showing moderate emotional distress"
      action: "Schedule follow-up within 48 hours"
    
    monitoring:
      label: "Awareness"
      color: "#FFC107"
      description: "Mild stress indicators worthy of monitoring"
      action: "Include in overall wellness trends"
    
    healthy:
      label: "Healthy"
      color: "#4CAF50"
      description: "No concerning indicators detected"
      action: "Continue routine check-ins"

  trends:
    window_days: 30
    min_responses: 10
    alert_threshold: 20  # % increase triggers alert

# --- Batch Analysis ---
batch:
  max_texts_per_batch: 100
  min_text_length: 10
  separator: "---"

# --- API Settings ---
api:
  enabled: true
  port: 8000
  rate_limit_per_minute: 60
  rate_limit_per_hour: 1000
  require_api_key: true
  cors_origins:
    - "http://localhost:*"
    - "https://*.mindguard.ai"

# --- Database (Aggregate Trends Only) ---
database:
  type: "sqlite"
  path: "data/mindguard.db"
  # ONLY stores: aggregate scores, org info, usage counts
  # NEVER stores: individual texts, individual results, PII

# --- Webhook Integrations ---
webhooks:
  enabled: true
  supported_events:
    - "batch_analysis_complete"
    - "critical_flag_detected"
    - "health_score_below_threshold"
  retry_attempts: 3
  timeout_seconds: 10

# --- Email Alerts ---
alerts:
  enabled: false  # Set to true and configure SMTP for production
  smtp_host: ""
  smtp_port: 587
  smtp_user: ""
  from_email: "alerts@mindguard.ai"
  # Trigger conditions
  triggers:
    health_score_below: 40
    critical_flags_above: 3
    burnout_average_above: 70

# --- Privacy (Enforced at Every Layer) ---
privacy:
  log_inputs: false
  store_individual_results: false
  aggregate_only: true
  anonymize_outputs: true
  retention_days: 90
  encryption: "AES-256"
