# ============================================================
# MindGuard Community Edition — Commercial Configuration
# Emotional Wellness Platform for Organizations & Communities
# Version 3.0.0 — Multi-Org, Sellable Edition
# ============================================================

# --- Community Features ---
community:
  name: "MindGuard"
  version: "3.0.0"
  tagline: "AI-Powered Anonymous Emotional Wellness Intelligence"
  support_email: "support@mindguard.ai"
  website: "https://mindguard.ai"
  
  ethical_disclaimer: >
    MindGuard is an ANONYMOUS SCREENING tool designed to help organizations
    understand the emotional wellness of their community at an AGGREGATE level.
    It does NOT diagnose, track individuals, or replace professional mental
    health services. All flagged concerns MUST be reviewed by a qualified
    professional.

# --- Pricing Tiers ---
pricing:
  tiers:
    free:
      name: "Community Free"
      max_analyses_per_month: 500
      max_batch_size: 25
      features:
        - "Single text analysis"
        - "Batch analysis (up to 25)"
        - "Basic emotional profiling"
        - "Community health score"
      price_usd: 0
    
    starter:
      name: "Starter"
      max_analyses_per_month: 5000
      max_batch_size: 100
      features:
        - "Everything in Free"
        - "REST API access"
        - "Trend history (30 days)"
        - "CSV/PDF export"
        - "Email alerts"
        - "8 emotional dimensions"
      price_usd: 29
    
    professional:
      name: "Professional"
      max_analyses_per_month: 50000
      max_batch_size: 500
      features:
        - "Everything in Starter"
        - "Trend history (365 days)"
        - "Webhook integrations"
        - "Custom branding"
        - "Priority support"
        - "Bias audit reports"
        - "Multi-user access"
      price_usd: 99
    
    enterprise:
      name: "Enterprise"
      max_analyses_per_month: -1  # Unlimited
      max_batch_size: 2000
      features:
        - "Everything in Professional"
        - "Unlimited analyses"
        - "On-premise deployment"
        - "Custom model fine-tuning"
        - "SLA guarantee"
        - "Dedicated account manager"
        - "HIPAA compliance support"
      price_usd: -1  # Contact sales

