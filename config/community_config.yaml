      - "good"
      - "okay"
      - "alright"
      - "fine"
      - "not bad"
      - "doing better"
    keywords_mild:
      - "managing"
      - "getting by"
      - "could be worse"

# --- Community Dashboard ---
dashboard:
  title: "MindGuard Community Dashboard"
  subtitle: "Anonymous Emotional Wellness Insights"
  
  # Risk tiers for community alerting
  risk_tiers:
    critical:
      label: "Immediate Attention"
      color: "#D32F2F"
      description: "Responses indicating severe distress or crisis"
      action: "Professional must review immediately"
    
    elevated:
      label: "Follow Up Needed"
      color: "#FF9800"
      description: "Responses showing moderate emotional distress"
      action: "Schedule follow-up within 48 hours"
    
    monitoring:
      label: "Awareness"
      color: "#FFC107"
      description: "Mild stress indicators worthy of monitoring"
      action: "Include in overall wellness trends"
    
    healthy:
      label: "Healthy"
      color: "#4CAF50"
      description: "No concerning indicators detected"
      action: "Continue routine check-ins"

  # Trend analysis settings
  trends:
    window_days: 30      # Trend analysis time window
    min_responses: 10    # Minimum responses for trend calculation
    alert_threshold: 20  # % increase in distress triggers alert

# --- Batch Analysis ---
batch:
  max_texts_per_batch: 100
  min_text_length: 10
  separator: "---"       # Separator for multi-text paste input

# --- API Settings ---
api:
  enabled: true
  port: 8000
  rate_limit: 100        # requests per minute
  require_api_key: true
  cors_origins:
    - "http://localhost:*"
    - "https://*.mindguard.org"

# --- Privacy (Inherited + Extended) ---
privacy:
  log_inputs: false           # HARD: never log user text
  store_individual_results: false   # HARD: never store per-person results
  aggregate_only: true        # HARD: only aggregate statistics
  anonymize_outputs: true     # Strip any potential identifiers
  retention_days: 90          # Keep aggregate stats for 90 days max
  encryption: "AES-256"       # Encryption standard for any stored data
